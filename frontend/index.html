<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Helper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
      border: 2px solid #f9fafb;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .break-text {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .message-content ul { list-style: disc; padding-left: 1.25rem; margin: 0.25rem 0; }
    .message-content ol { list-style: decimal; padding-left: 1.25rem; margin: 0.25rem 0; }
    .message-content li { margin: 0.1rem 0; }
    .message-content strong { font-weight: 600; }
    .message-content em { font-style: italic; }
    .message-content h1, .message-content h2, .message-content h3 { font-weight: 600; margin: 0.4rem 0 0.2rem; }
    .message-content p { margin: 0.25rem 0; }
    .message-content a { color: #2563eb; text-decoration: underline; }
    .message-content a:hover { color: #1d4ed8; }
    .message-content code { background: #f3f4f6; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; }
    .message-content pre { background: #f3f4f6; padding: 0.75rem; border-radius: 6px; overflow-x: auto; margin: 0.4rem 0; }
    @keyframes search-shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .search-bar-shimmer {
      background: linear-gradient(90deg, #3b82f6 25%, #93c5fd 50%, #3b82f6 75%);
      background-size: 200% auto;
      animation: search-shimmer 1.4s linear infinite;
      transition: width 0.3s ease;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">
  <div class="w-72 bg-white flex flex-col border-r border-gray-200 hidden md:flex z-30 flex-shrink-0">
    <div class="p-5 border-b border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shadow-md shadow-blue-200">
        <i class="fa-solid fa-brain text-white text-sm"></i>
      </div>
      <div>
        <h1 class="font-bold text-lg tracking-tight text-blue-500">
          Office Helper
        </h1>
        <p class="text-xs text-gray-500">v2.0</p>
      </div>
    </div>
    <div class="p-4">
      <button id="newSessionBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md active:scale-95">
        <i class="fa-solid fa-plus text-sm"></i>
        <span class="font-medium text-sm">New Chat</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto px-3 space-y-1" id="sessionList"></div>
    <div class="px-3 py-3 border-t border-gray-100">
      <div class="flex items-center justify-between mb-2 px-1">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Documents</span>
        <button id="uploadDocBtn" title="Upload PDF"
          class="text-gray-400 hover:text-blue-600 transition-colors p-1 rounded">
          <i class="fa-solid fa-upload text-xs"></i>
        </button>
      </div>
      <input type="file" id="docFileInput" accept=".pdf" class="hidden" />
      <div id="uploadProgress" class="hidden mt-2 mb-1 px-1">
        <div class="flex items-center justify-between mb-1">
          <p id="uploadStageName" class="text-xs text-gray-400 truncate flex-1"></p>
          <button id="cancelUploadBtn" class="hidden text-xs text-red-400 hover:text-red-600 ml-2 transition-colors" title="Cancel upload">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-1.5">
          <div id="uploadProgressBar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
      <div id="documentList" class="space-y-1 max-h-36 overflow-y-auto"></div>
    </div>
    <div class="p-4 border-t border-gray-100 bg-gray-50">
      <div class="flex items-center gap-3 w-full p-2">
        <div id="userDisplayCharacter"
          class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-500 flex items-center justify-center text-white font-bold shadow-sm">
         
        </div>
        <div class="text-left flex-1">
          <p id="userDisplayName" class="text-sm font-semibold text-gray-700"></p>
          <p class="text-xs text-green-600 font-medium">● Online</p>
        </div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col h-full bg-gray-50/50 min-w-0 relative">
    <div
      class="h-16 shrink-0 border-b border-gray-200 flex items-center justify-between px-6 bg-white/80 backdrop-blur-md z-10">
      <div class="flex items-center gap-2 text-gray-500">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-xs font-medium">System Ready</span>
        <div id="contextUsage" class="flex items-center gap-1.5 ml-3">
          <div class="w-16 bg-gray-200 rounded-full h-1 overflow-hidden">
            <div class="ctx-bar h-1 rounded-full bg-green-400 transition-all duration-500" style="width:0%"></div>
          </div>
          <span class="ctx-label text-xs text-gray-400">0% context</span>
        </div>
      </div>
      <button id="resetBtn"
        class="text-xs text-gray-400 hover:text-red-500 transition-colors bg-gray-100 px-3 py-1.5 rounded-full"
        title="Reset Session">
        <i class="fa-solid fa-power-off mr-1"></i> Reset
      </button>
    </div>

    <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-smooth w-full">
      <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center animate-fade-in px-4">
        <div
          class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mb-6 shadow-xl shadow-gray-200 border border-gray-100">
          <i class="fa-solid fa-robot text-4xl text-blue-600"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Office Helper</h2>
        <p class="text-gray-500 max-w-md">Upload your documents and ask me to create presentations, Word files, PDFs, checklists, or comparison tables — or search the web.</p>
      </div>
    </div>

    <div class="shrink-0 p-4 md:p-6 bg-white border-t border-gray-200 z-20 w-full">
      <div class="max-w-4xl mx-auto relative group">
        <div
          class="relative flex items-end gap-2 bg-gray-50 border border-gray-200 rounded-2xl p-2 shadow-inner focus-within:bg-white focus-within:shadow-md focus-within:border-blue-300 transition-all">
          <textarea id="userInput" rows="1"
            class="flex-1 bg-transparent border-none outline-none text-gray-800 placeholder-gray-400 py-3 px-3 resize-none max-h-32 text-sm md:text-base font-sans"
            placeholder="Write a message..."></textarea>

          <button type="button" id="sendBtn"
            class="p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all shadow-md active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>

    <script type="module" src="/chatbot.js"></script>

  <!-- New Chat Modal -->
  <div id="newChatModal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl w-[580px] max-h-[85vh] flex flex-col mx-4">

      <div class="px-6 pt-5 pb-4 border-b border-gray-100 flex items-center justify-between">
        <h2 class="text-base font-semibold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-plus text-blue-600 text-sm"></i> New Chat
        </h2>
        <button id="closeNewChatBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="px-6 py-4 overflow-y-auto flex-1 space-y-4">

        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1.5">Chat Title</label>
          <input id="newChatTitle" type="text" placeholder="e.g. Q3 Report Analysis"
            class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div class="border border-gray-200 rounded-xl p-4 bg-gray-50 space-y-3">
          <p class="text-xs font-semibold text-gray-600 tracking-wider flex items-center gap-1.5">
            <i class="fa-solid fa-magnifying-glass text-blue-500"></i>
            Find Files to Upload
            <span class="font-normal text-gray-400 ml-1">(optional)</span>
          </p>
          <div class="flex gap-2">
            <input id="fileSearchKeyword" type="text" placeholder="Keyword..."
              class="flex-1 border border-gray-200 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white" />
            <button id="fileSearchBtn"
              class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm hover:bg-blue-700 disabled:opacity-50 transition-colors flex items-center gap-1.5">
              <i class="fa-solid fa-search text-xs"></i> Search
            </button>
          </div>
          <div class="flex gap-5 text-sm text-gray-600">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="exactMatchCheck" class="rounded accent-blue-600" />
              <span>Exact match</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="containsNameCheck" checked class="rounded accent-blue-600" />
              <span>Contains in name</span>
            </label>
          </div>

          <div id="formSearchLoading" class="hidden py-1">
            <p class="text-xs text-gray-400 mb-1">Searching...</p>
            <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
              <div id="formSearchBar" class="h-1.5 rounded-full search-bar-shimmer" style="width:0%"></div>
            </div>
          </div>

          <div id="formSearchResults" class="hidden overflow-x-auto min-w-0 break-words text-sm"></div>

          <div id="formUploadProgress" class="hidden pt-1">
            <div class="flex items-center justify-between mb-1">
              <p id="formUploadStage" class="text-xs text-gray-500 truncate flex-1"></p>
              <button id="formCancelUploadBtn" class="hidden text-xs text-red-400 hover:text-red-600 ml-2">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-1.5">
              <div id="formUploadBar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
            </div>
          </div>
        </div>

      </div>

      <div id="modalFooter" class="hidden px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
        <button id="cancelNewChatBtn"
          class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition-colors">
          Cancel
        </button>
        <button id="startChatBtn"
          class="px-5 py-2 bg-blue-600 text-white text-sm rounded-xl hover:bg-blue-700 transition-colors shadow-md shadow-blue-100 active:scale-95">
          <i class="fa-solid fa-comment-dots mr-1.5"></i> Start Chat
        </button>
      </div>

    </div>
  </div>

</body>

</html>
